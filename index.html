<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kermes POS — Garson</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --card: #141418;
  --card2: #1c1c22;
  --border: #2a2a35;
  --accent: #ff6b35;
  --green: #00d68f;
  --red: #ff4757;
  --gold: #ffd166;
  --text: #f0eeff;
  --muted: #6b6b80;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* LOGIN */
#login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; gap:2rem; background:radial-gradient(ellipse at 50% 0%, rgba(255,107,53,0.1) 0%, transparent 65%); }
.logo { font-family:'Syne',sans-serif; font-size:2.8rem; font-weight:800; letter-spacing:-1px; }
.logo em { color:var(--accent); font-style:normal; }
.login-box { width:100%; max-width:380px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2rem; display:flex; flex-direction:column; gap:1rem; }
.login-box h2 { font-size:0.78rem; color:var(--muted); font-weight:500; letter-spacing:2px; text-transform:uppercase; }
.inp { width:100%; padding:0.9rem 1rem; background:var(--card2); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:1rem; outline:none; transition:border-color 0.2s; }
.inp:focus { border-color:var(--accent); }
.err { color:var(--red); font-size:0.82rem; text-align:center; min-height:18px; font-weight:600; }
.btn-login { width:100%; padding:1rem; border:none; border-radius:12px; background:var(--accent); color:#fff; font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:1px; }
.btn-login:active { opacity:0.85; }
.nav-alt { display:flex; gap:1.5rem; }
.nav-alt a { color:var(--muted); font-size:0.82rem; text-decoration:none; }

/* APP */
#app { display:none; flex-direction:column; min-height:100vh; }
.topbar { background:var(--card); border-bottom:1px solid var(--border); padding:0.75rem 1rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.topbar-logo { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; }
.topbar-logo em { color:var(--accent); font-style:normal; }
.user-chip { background:var(--card2); border:1px solid var(--border); border-radius:20px; padding:0.3rem 0.8rem; font-size:0.78rem; color:var(--muted); }
.user-chip span { color:var(--text); font-weight:600; }
.btn-cikis { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-size:0.75rem; padding:0.3rem 0.7rem; cursor:pointer; font-family:'DM Sans',sans-serif; }
.nav-bar { display:flex; gap:1rem; padding:0.6rem 1rem; background:var(--card); border-bottom:1px solid var(--border); }
.nav-bar a { color:var(--muted); font-size:0.8rem; text-decoration:none; }
.tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:57px; z-index:99; }
.tab { flex:1; padding:0.85rem; text-align:center; font-size:0.85rem; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.content { padding:1rem; flex:1; padding-bottom:5rem; }
.sec-label { font-size:0.7rem; font-weight:700; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:0.5rem; }

/* MASA — native select */
.masa-select-wrap { position:relative; margin-bottom:1.25rem; }
.masa-select {
  width:100%; padding:0.85rem 2.5rem 0.85rem 1rem;
  background:var(--card2); border:1.5px solid var(--border); border-radius:var(--radius);
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600;
  outline:none; cursor:pointer; appearance:none; -webkit-appearance:none;
  transition:border-color 0.2s;
}
.masa-select:focus, .masa-select.selected { border-color:var(--accent); }
.masa-select-arrow { position:absolute; right:1rem; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--muted); font-size:0.8rem; }
.masa-select option { background:#1c1c22; color:#f0eeff; }

/* KATEGORİ — button grubu */
.kat-group { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1rem; }
.kat-btn { padding:0.4rem 0.9rem; background:var(--card); border:1px solid var(--border); border-radius:8px; font-size:0.8rem; font-weight:500; cursor:pointer; color:var(--muted); font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.kat-btn.active { background:var(--card2); border-color:var(--accent); color:var(--accent); font-weight:700; }

/* ÜRÜN — tam genişlik liste */
.urun-liste { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:1.25rem; }
.urun-row {
  display:flex; align-items:center; background:var(--card);
  border:1.5px solid var(--border); border-radius:var(--radius);
  padding:0.75rem 1rem; gap:0.75rem; transition:border-color 0.2s;
}
.urun-row.in-cart { border-color:var(--accent); background:rgba(255,107,53,0.05); }
.urun-info { flex:1; min-width:0; }
.urun-ad { font-weight:600; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.urun-fiyat { color:var(--gold); font-weight:700; font-size:0.85rem; margin-top:0.15rem; }
.qty-wrap { display:flex; align-items:center; gap:0.4rem; flex-shrink:0; }
.qty-btn { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; font-family:'DM Sans',sans-serif; }
.qty-btn:active { background:var(--accent); border-color:var(--accent); color:#fff; }
.qty-num { font-weight:700; font-size:0.95rem; min-width:22px; text-align:center; color:var(--accent); }
.add-btn { width:30px; height:30px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; }
.add-btn:active { opacity:0.8; }

.not-input { width:100%; resize:none; height:60px; font-size:0.85rem; background:var(--card2); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; padding:0.8rem 1rem; outline:none; margin-bottom:1rem; }
.not-input:focus { border-color:var(--accent); }
.empty-msg { color:var(--muted); font-size:0.88rem; padding:1.5rem 0; text-align:center; }

/* SEPET BAR */
.sepet-bar { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); padding:0.9rem 1rem; z-index:98; }
.sepet-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.7rem; }
.sepet-toplam { font-family:'Syne',sans-serif; font-size:1.6rem; color:var(--gold); font-weight:800; }
.btn-gonder { width:100%; padding:0.95rem; border:none; border-radius:12px; background:var(--accent); color:#fff; font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:1px; }
.btn-gonder:active { opacity:0.9; }

/* SİPARİŞLERİM */
.filtre-row { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1rem; }
.f-chip { padding:0.35rem 0.8rem; background:var(--card); border:1px solid var(--border); border-radius:8px; font-size:0.78rem; font-weight:500; cursor:pointer; color:var(--muted); font-family:'DM Sans',sans-serif; }
.f-chip.active { border-color:var(--accent); color:var(--accent); font-weight:700; }
.sip-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; margin-bottom:0.6rem; }
.sip-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.4rem; }
.sip-masa { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; }
.sip-sure { font-size:0.72rem; color:var(--muted); }
.sip-badge { display:inline-flex; align-items:center; padding:0.18rem 0.65rem; border-radius:8px; font-size:0.72rem; font-weight:700; margin-bottom:0.4rem; }
.b-bekliyor { background:rgba(255,209,102,0.12); color:var(--gold); }
.b-hazirlaniyor { background:rgba(255,107,53,0.12); color:var(--accent); }
.b-hazir { background:rgba(0,214,143,0.15); color:var(--green); }
.b-teslim { background:rgba(0,214,143,0.08); color:var(--green); }
.b-odendi { background:rgba(107,107,128,0.15); color:var(--muted); }
.sip-urunler { font-size:0.82rem; color:var(--muted); }
.sip-toplam { font-size:0.85rem; color:var(--gold); font-weight:700; margin-top:0.4rem; }
.btn-temizle { width:100%; margin-top:0.75rem; padding:0.8rem; background:rgba(255,71,87,0.1); color:var(--red); border:1px solid rgba(255,71,87,0.25); border-radius:10px; font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; }

/* BİLDİRİM */
#bildirim { display:none; position:fixed; top:0; left:0; right:0; z-index:999; background:var(--green); padding:0.75rem 1rem; }
.bil-ic { display:flex; align-items:center; gap:0.75rem; max-width:500px; margin:0 auto; }
.bil-text { flex:1; }
.bil-baslik { font-family:'Syne',sans-serif; font-size:1rem; color:#000; font-weight:700; }
.bil-masa { font-size:0.78rem; color:rgba(0,0,0,0.65); }
.btn-teslim { background:rgba(0,0,0,0.2); border:none; border-radius:8px; color:#000; font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.78rem; padding:0.4rem 0.8rem; cursor:pointer; white-space:nowrap; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; align-items:center; justify-content:center; padding:1.5rem; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:1.75rem; width:100%; max-width:360px; display:flex; flex-direction:column; gap:1rem; }
.modal-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; }
.modal-msg { font-size:0.82rem; min-height:18px; font-weight:600; }
.modal-msg.err { color:var(--red); }
.modal-msg.ok { color:var(--green); }
.modal-row { display:flex; gap:0.5rem; }
.btn-modal-iptal { flex:1; padding:0.85rem; border:1px solid var(--border); border-radius:10px; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.9rem; cursor:pointer; }
.btn-modal-kaydet { flex:1; padding:0.85rem; border:none; border-radius:10px; background:var(--accent); color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; }
.btn-sifre { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-size:0.72rem; padding:0.28rem 0.65rem; cursor:pointer; font-family:'DM Sans',sans-serif; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo">KERMES<em>POS</em></div>
  <div class="login-box">
    <h2>Garson Girişi</h2>
    <input class="inp" type="text" id="inp-kullanici" placeholder="Kullanıcı adı" autocomplete="username">
    <input class="inp" type="password" id="inp-sifre" placeholder="Şifre" autocomplete="current-password">
    <div class="err" id="login-err"></div>
    <button class="btn-login" id="btn-giris">GİRİŞ YAP</button>
  </div>
  <div class="nav-alt">
    <a href="mutfak.html">🍳 Mutfak</a>
    <a href="kasa.html">💰 Kasa</a>
    <a href="yonetici.html">⚙️ Yönetici</a>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">KERMES<em>POS</em></div>
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <div class="user-chip">👤 <span id="badge-garson"></span></div>
      <button class="btn-sifre" id="btn-sifre-ac">🔑 Şifre</button>
      <button class="btn-cikis" id="btn-cikis">Çıkış</button>
    </div>
  </div>
  <div class="nav-bar">
    <a href="mutfak.html">🍳 Mutfak</a>
    <a href="kasa.html">💰 Kasa</a>
    <a href="yonetici.html">⚙️ Yönetici</a>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-siparis">🛒 Sipariş</div>
    <div class="tab" id="tab-siparislerim">📋 Siparişlerim</div>
  </div>

  <!-- SİPARİŞ PANELİ -->
  <div class="content" id="pane-siparis">

    <div class="sec-label">Masa Seç</div>
    <div class="masa-select-wrap">
      <select class="masa-select" id="masa-select">
        <option value="">— Masa seçin —</option>
      </select>
      <div class="masa-select-arrow">▼</div>
    </div>

    <div class="sec-label">Kategori</div>
    <div class="kat-group" id="kat-group"></div>

    <div class="sec-label">Ürünler</div>
    <div class="urun-liste" id="urun-liste">
      <div class="empty-msg">Yükleniyor...</div>
    </div>

    <div class="sec-label">Not (opsiyonel)</div>
    <textarea class="not-input" id="siparis-not" placeholder="Özel istek, alerji vb..."></textarea>
  </div>

  <!-- SİPARİŞLERİM PANELİ -->
  <div class="content" id="pane-siparislerim" style="display:none;">
    <div class="filtre-row" id="filtre-row">
      <div class="f-chip active" data-f="hepsi">Hepsi</div>
      <div class="f-chip" data-f="bekliyor">⏳ Bekleyen</div>
      <div class="f-chip" data-f="hazirlaniyor">🔥 Hazırlanıyor</div>
      <div class="f-chip" data-f="hazir">✅ Hazır</div>
      <div class="f-chip" data-f="teslim">📦 Teslim</div>
    </div>
    <div id="sip-liste"></div>
    <button class="btn-temizle" id="btn-temizle">🗑️ Teslim Edilenleri Temizle</button>
  </div>

  <!-- SEPET BAR -->
  <div class="sepet-bar" id="sepet-bar">
    <div class="sepet-row">
      <span style="font-size:0.85rem;color:var(--muted);">Toplam</span>
      <span class="sepet-toplam" id="sepet-toplam">₺0</span>
    </div>
    <button class="btn-gonder" id="btn-gonder">SİPARİŞİ GÖNDER →</button>
  </div>
</div>


<!-- ŞİFRE DEĞİŞTİR MODAL -->
<div class="modal-overlay" id="sifre-modal">
  <div class="modal-box">
    <div class="modal-title">🔑 Şifre Değiştir</div>
    <input class="inp" type="password" id="sifre-mevcut" placeholder="Mevcut şifre">
    <input class="inp" type="password" id="sifre-yeni" placeholder="Yeni şifre">
    <input class="inp" type="password" id="sifre-yeni2" placeholder="Yeni şifre (tekrar)">
    <div class="modal-msg" id="sifre-msg"></div>
    <div class="modal-row">
      <button class="btn-modal-iptal" id="btn-sifre-iptal">İptal</button>
      <button class="btn-modal-kaydet" id="btn-sifre-kaydet">Kaydet</button>
    </div>
  </div>
</div>

<!-- BİLDİRİM -->
<div id="bildirim">
  <div class="bil-ic">
    <div>🔔</div>
    <div class="bil-text">
      <div class="bil-baslik">SİPARİŞ HAZIR!</div>
      <div class="bil-masa" id="bil-masa"></div>
    </div>
    <button class="btn-teslim" id="btn-teslim">Teslim Alındı ✓</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey: "AIzaSyCYtlHe7HjTsyX4V78m3q_6dFmn0Zq3dgY",
  authDomain: "eryaman-32833.firebaseapp.com",
  databaseURL: "https://eryaman-32833-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "eryaman-32833",
  storageBucket: "eryaman-32833.firebasestorage.app",
  messagingSenderId: "483490073236",
  appId: "1:483490073236:web:0bcd8c019614024e960281"
}));

// ── State ──
let garsonAdi = '', garsonKey = '';
let masalar = [], urunler = [];
let sepet = {};
let aktifKat = 'Hepsi', aktifFiltre = 'hepsi';
let siparislerim = {};
let bildirimGosterilenler = new Set();
let bildirimKuyrugu = [], bildirimAktif = false;
let baslatildi = false;

// ── Auth ──
let garsonlarCache = {};
onValue(ref(db, 'garsonlar'), snap => {
  garsonlarCache = {};
  if (snap.exists()) snap.forEach(c => { garsonlarCache[c.key] = { id: c.key, ...c.val() }; });
  const k = localStorage.getItem('kermes_garson_key');
  if (k && garsonlarCache[k] && !garsonAdi) _giris(garsonlarCache[k]);
});

document.getElementById('btn-giris').onclick = girisYap;
document.getElementById('inp-sifre').addEventListener('keypress', e => { if (e.key === 'Enter') girisYap(); });
document.getElementById('inp-kullanici').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('inp-sifre').focus(); });

function girisYap() {
  const err = document.getElementById('login-err');
  const ad  = document.getElementById('inp-kullanici').value.trim();
  const sif = document.getElementById('inp-sifre').value.trim();
  if (!ad || !sif) { err.textContent = 'Kullanıcı adı ve şifre girin!'; return; }
  if (!Object.keys(garsonlarCache).length) { err.textContent = 'Bağlanıyor, bekleyin...'; return; }
  const g = Object.values(garsonlarCache).find(x => x.ad === ad && x.sifre === sif);
  if (!g) { err.textContent = 'Kullanıcı adı veya şifre yanlış!'; document.getElementById('inp-sifre').value = ''; return; }
  localStorage.setItem('kermes_garson_key', g.id);
  _giris(g);
}
function _giris(g) {
  garsonAdi = g.ad; garsonKey = g.id;
  document.getElementById('badge-garson').textContent = g.ad;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('login-err').textContent = '';
  baslat();
}
document.getElementById('btn-cikis').onclick = () => {
  if (confirm('Çıkış yapmak istiyor musunuz?')) { localStorage.removeItem('kermes_garson_key'); location.reload(); }
};

// ── Başlat (tek sefer) ──
function baslat() {
  if (baslatildi) return;
  baslatildi = true;

  onValue(ref(db, 'masalar'), snap => {
    masalar = [];
    if (snap.exists()) { const v = snap.val(); masalar = Object.entries(v).map(([id, d]) => ({ id, ...d })); }
    renderMasalar();
  });

  onValue(ref(db, 'urunler'), snap => {
    urunler = [];
    if (snap.exists()) { const v = snap.val(); urunler = Object.entries(v).map(([id, d]) => ({ id, ...d })); }
    aktifKat = 'Hepsi';
    renderKategoriler();
    renderUrunler();
  });

  onValue(ref(db, 'siparisler'), snap => {
    siparislerim = {};
    if (snap.exists()) {
      snap.forEach(c => {
        const s = { id: c.key, ...c.val() };
        if (s.garson === garsonAdi && s.durum !== 'odendi') {
          siparislerim[c.key] = s;
          if (s.durum === 'hazir' && !bildirimGosterilenler.has(c.key)) {
            bildirimGosterilenler.add(c.key);
            bildirimEkle(s);
          }
        }
      });
    }
    renderSiparislerim();
  });
}

// ── Tabs ──
document.getElementById('tab-siparis').onclick = () => {
  document.getElementById('tab-siparis').classList.add('active');
  document.getElementById('tab-siparislerim').classList.remove('active');
  document.getElementById('pane-siparis').style.display = 'block';
  document.getElementById('pane-siparislerim').style.display = 'none';
  renderSepetBar();
};
document.getElementById('tab-siparislerim').onclick = () => {
  document.getElementById('tab-siparislerim').classList.add('active');
  document.getElementById('tab-siparis').classList.remove('active');
  document.getElementById('pane-siparislerim').style.display = 'block';
  document.getElementById('pane-siparis').style.display = 'none';
  document.getElementById('sepet-bar').style.display = 'none';
};

// ── Masalar — native select ──
function renderMasalar() {
  const sel = document.getElementById('masa-select');
  const mevcutDeger = sel.value;
  sel.innerHTML = '<option value="">— Masa seçin —</option>';
  masalar.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = m.ad;
    sel.appendChild(opt);
  });
  if (mevcutDeger) sel.value = mevcutDeger;
}
document.getElementById('masa-select').addEventListener('change', e => {
  if (e.target.value) e.target.classList.add('selected');
  else e.target.classList.remove('selected');
  renderSepetBar();
});

function getSeciliMasa() {
  return document.getElementById('masa-select').value || null;
}

// ── Kategoriler ──
function renderKategoriler() {
  const katlar = ['Hepsi', ...new Set(urunler.map(u => (u.kategori || '').trim()).filter(Boolean))];
  document.getElementById('kat-group').innerHTML = katlar.map(k =>
    `<button class="kat-btn${aktifKat === k ? ' active' : ''}" data-k="${k}">${k}</button>`
  ).join('');
}
document.getElementById('kat-group').addEventListener('click', e => {
  const b = e.target.closest('.kat-btn');
  if (!b) return;
  aktifKat = b.dataset.k;
  renderKategoriler();
  renderUrunler();
});

// ── Ürünler — liste ──
function renderUrunler() {
  const liste = aktifKat === 'Hepsi' ? urunler : urunler.filter(u => (u.kategori || '').trim() === aktifKat);
  const el = document.getElementById('urun-liste');
  if (!liste.length) {
    el.innerHTML = '<div class="empty-msg">Bu kategoride ürün yok.</div>';
    return;
  }
  // Her ürün için ayrı div oluştur — innerHTML string concat YOK
  el.innerHTML = '';
  liste.forEach(u => {
    const adet = sepet[u.id]?.adet || 0;
    const div = document.createElement('div');
    div.className = 'urun-row' + (adet > 0 ? ' in-cart' : '');
    div.innerHTML = `
      <div class="urun-info">
        <div class="urun-ad">${u.ad}</div>
        <div class="urun-fiyat">₺${u.fiyat}</div>
      </div>
      <div class="qty-wrap">
        ${adet > 0
          ? `<button class="qty-btn" data-azalt="${u.id}">−</button>
             <span class="qty-num">${adet}</span>
             <button class="qty-btn" data-artir="${u.id}">+</button>`
          : `<button class="add-btn" data-artir="${u.id}">+</button>`
        }
      </div>`;
    el.appendChild(div);
  });
}

document.getElementById('urun-liste').addEventListener('click', e => {
  const artir = e.target.closest('[data-artir]');
  const azalt = e.target.closest('[data-azalt]');
  if (artir) {
    const uid = artir.dataset.artir;
    const u = urunler.find(x => x.id === uid);
    if (!u) return;
    if (!sepet[uid]) sepet[uid] = { ...u, adet: 0 };
    sepet[uid].adet++;
    renderUrunler();
    renderSepetBar();
  } else if (azalt) {
    const uid = azalt.dataset.azalt;
    if (!sepet[uid]) return;
    sepet[uid].adet--;
    if (sepet[uid].adet <= 0) delete sepet[uid];
    renderUrunler();
    renderSepetBar();
  }
});

// ── Sepet ──
function renderSepetBar() {
  const items = Object.values(sepet).filter(s => s.adet > 0);
  const bar = document.getElementById('sepet-bar');
  const seciliMasa = getSeciliMasa();
  if (items.length && seciliMasa) {
    bar.style.display = 'block';
    document.getElementById('sepet-toplam').textContent = '₺' + items.reduce((t, s) => t + s.fiyat * s.adet, 0);
  } else {
    bar.style.display = 'none';
  }
}

document.getElementById('btn-gonder').onclick = async () => {
  const items = Object.values(sepet).filter(s => s.adet > 0);
  const seciliMasaId = getSeciliMasa();
  if (!seciliMasaId) { alert('Masa seçin!'); return; }
  if (!items.length) { alert('Sepet boş!'); return; }
  const masa = masalar.find(m => m.id === seciliMasaId);
  await push(ref(db, 'siparisler'), {
    garson: garsonAdi,
    masaId: seciliMasaId,
    masaAd: masa ? masa.ad : seciliMasaId,
    urunler: items.map(i => ({ ad: i.ad, fiyat: i.fiyat, adet: i.adet })),
    toplam: items.reduce((t, i) => t + i.fiyat * i.adet, 0),
    not: document.getElementById('siparis-not').value.trim(),
    durum: 'bekliyor',
    zaman: serverTimestamp()
  });
  sepet = {};
  document.getElementById('masa-select').value = '';
  document.getElementById('masa-select').classList.remove('selected');
  document.getElementById('siparis-not').value = '';
  renderUrunler();
  renderSepetBar();
  document.getElementById('tab-siparislerim').click();
};

// ── Siparişlerim ──
document.getElementById('filtre-row').addEventListener('click', e => {
  const c = e.target.closest('.f-chip');
  if (!c) return;
  aktifFiltre = c.dataset.f;
  document.querySelectorAll('.f-chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  renderSiparislerim();
});
document.getElementById('btn-temizle').onclick = async () => {
  const t = Object.values(siparislerim).filter(s => s.durum === 'teslim');
  if (!t.length) { alert('Temizlenecek sipariş yok.'); return; }
  if (!confirm(t.length + ' sipariş kapatılsın mı?')) return;
  const updates = {};
  t.forEach(s => { updates['siparisler/' + s.id + '/durum'] = 'odendi'; });
  await update(ref(db), updates);
};
function renderSiparislerim() {
  const el = document.getElementById('sip-liste');
  let items = Object.values(siparislerim);
  if (aktifFiltre !== 'hepsi') items = items.filter(s => s.durum === aktifFiltre);
  if (!items.length) { el.innerHTML = '<div class="empty-msg">Gösterilecek sipariş yok.</div>'; return; }
  items.sort((a, b) => (b.zaman || 0) - (a.zaman || 0));
  const bc = { bekliyor:'b-bekliyor', hazirlaniyor:'b-hazirlaniyor', hazir:'b-hazir', teslim:'b-teslim', odendi:'b-odendi' };
  const bt = { bekliyor:'⏳ Bekliyor', hazirlaniyor:'🔥 Hazırlanıyor', hazir:'✅ Hazır — Teslim Al', teslim:'📦 Teslim Edildi', odendi:'✓ Ödendi' };
  el.innerHTML = '';
  items.forEach(s => {
    const div = document.createElement('div');
    div.className = 'sip-card';
    if (s.durum === 'teslim') div.style.opacity = '0.55';
    div.innerHTML = `
      <div class="sip-top">
        <div class="sip-masa">${s.masaAd}</div>
        <div class="sip-sure">${sureFmt(s.zaman)}</div>
      </div>
      <div class="sip-badge ${bc[s.durum]||''}">${bt[s.durum]||s.durum}</div>
      <div class="sip-urunler">${s.urunler.map(u => u.adet+'x '+u.ad).join(', ')}</div>
      ${s.not ? `<div style="font-size:0.78rem;color:var(--muted);margin-top:0.3rem;">📝 ${s.not}</div>` : ''}
      <div class="sip-toplam">₺${s.toplam}</div>`;
    el.appendChild(div);
  });
}

// ── Bildirim ──
function bildirimEkle(s) {
  if (!bildirimKuyrugu.find(k => k.id === s.id)) bildirimKuyrugu.push(s);
  if (!bildirimAktif) bildirimGoster();
}
function bildirimGoster() {
  if (!bildirimKuyrugu.length) {
    bildirimAktif = false;
    document.getElementById('bildirim').style.display = 'none';
    return;
  }
  bildirimAktif = true;
  const s = bildirimKuyrugu[0];
  window._bildirimId = s.id;
  document.getElementById('bil-masa').textContent = s.masaAd + ' — ' + s.urunler.map(u => u.adet+'x '+u.ad).join(', ');
  document.getElementById('bildirim').style.display = 'flex';
}
document.getElementById('btn-teslim').onclick = async () => {
  if (window._bildirimId) await update(ref(db, 'siparisler/' + window._bildirimId), { durum: 'teslim' });
  bildirimKuyrugu.shift();
  bildirimGoster();
};

function sureFmt(ts) {
  if (!ts) return '';
  const sn = Math.floor((Date.now() - ts) / 1000);
  if (sn < 60) return sn + 'sn önce';
  const dk = Math.floor(sn / 60);
  if (dk < 60) return dk + 'dk önce';
  return Math.floor(dk / 60) + 'sa önce';
}

// ── Şifre Değiştir ──
document.getElementById('btn-sifre-ac').onclick = () => {
  document.getElementById('sifre-mevcut').value = '';
  document.getElementById('sifre-yeni').value = '';
  document.getElementById('sifre-yeni2').value = '';
  document.getElementById('sifre-msg').textContent = '';
  document.getElementById('sifre-msg').className = 'modal-msg';
  document.getElementById('sifre-modal').classList.add('open');
};
document.getElementById('btn-sifre-iptal').onclick = () => {
  document.getElementById('sifre-modal').classList.remove('open');
};
document.getElementById('sifre-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('sifre-modal'))
    document.getElementById('sifre-modal').classList.remove('open');
});
document.getElementById('btn-sifre-kaydet').onclick = async () => {
  const msg = document.getElementById('sifre-msg');
  const mevcut = document.getElementById('sifre-mevcut').value.trim();
  const yeni   = document.getElementById('sifre-yeni').value.trim();
  const yeni2  = document.getElementById('sifre-yeni2').value.trim();
  msg.className = 'modal-msg err';
  if (!mevcut || !yeni || !yeni2) { msg.textContent = 'Tüm alanları doldurun!'; return; }
  if (garsonlarCache[garsonKey]?.sifre !== mevcut) { msg.textContent = 'Mevcut şifre yanlış!'; return; }
  if (yeni.length < 3) { msg.textContent = 'Yeni şifre en az 3 karakter olmalı!'; return; }
  if (yeni !== yeni2) { msg.textContent = 'Yeni şifreler eşleşmiyor!'; return; }
  await update(ref(db, 'garsonlar/' + garsonKey), { sifre: yeni });
  msg.className = 'modal-msg ok';
  msg.textContent = '✅ Şifre başarıyla değiştirildi!';
  setTimeout(() => document.getElementById('sifre-modal').classList.remove('open'), 1500);
};

setInterval(renderSiparislerim, 10000);
</script>
</body>
</html>
